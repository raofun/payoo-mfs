<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo |Home</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <main class="flex justify-center">
        <div class="mockup-phone">
            <div class="camera"></div>
            <div class="display">
                <div class="artboard artboard-demo phone-2">
                    <!-- Available Balance -->
                    <div>
                        <div class="stats shadow">
                            <div class="stat">
                                <div class="stat-value">89,400</div>
                                <div class="stat-desc">Available Balance</div>
                            </div>
                        </div>
                    </div>
                    <div class="divider"></div>
                    <!-- User action -->
                    <div class="ml-4">
                        <!-- <div>
                            <h4 class="text-3xl font-bold">Welcome to Payoo!</h4>
                            <p class="text-lg mt-3">Enjoy easy and convenient financial services with us. Cashout charge
                                is low and </p>
                        </div> -->
                        <div class="flex justify-center gap-3 mb-4">
                            <button class="btn btn-lg">Add Money</button>
                            <button class="btn btn-lg">Cashout</button>
                        </div>
                    </div>
                    <!-- Add Money Form -->
                    <div>
                        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
                            <form class="card-body">
                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text">Amount</span>
                                    </label>
                                    <input type="number" placeholder="Amount" class="input input-bordered" autocomplete="off" required />
                                </div>
                                <div class="form-control">
                                    <label class="label">
                                        <span class="label-text">Pin</span>
                                    </label>
                                    <input type="password" placeholder="Pin" class="input input-bordered"
                                        required />
                                </div>
                                <div class="form-control mt-6">
                                    <button id="btn-money" class="btn btn-primary">Add Money</button>
                                </div>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>
    <script src="js/home.js"></script>
</body>

</html>
